name: Scala CI with Coveralls

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Test coverage
        run: sbt clean coverage test coverageReport

      - name: Verify exclusions
        run: |
          echo "Checking that Gui.scala and Main.scala are not in scoverage report..."
          if grep -E "Gui.scala|Main.scala" target/scala-3.8.2/scoverage-report/scoverage.xml; then
            echo "Gui.scala or Main.scala is still in scoverage report"
            exit 1
          fi

      - name: Upload coverage to Coveralls
        if: env.COVERALLS_REPO_TOKEN != ''
        run: sbt coveralls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
          COVERALLS_FLAG_NAME: Scala