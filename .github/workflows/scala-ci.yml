name: Test, Coverage and SonarQube

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    outputs:
      test_exit_code: ${{ steps.coverage.outputs.exit_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests with coverage
        id: coverage
        continue-on-error: true
        run: |
          set +e
          sbt clean coverage test coverageReport
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Create coverage badge data
        run: |
          mkdir -p badges

          TEST_EXIT_CODE="${{ steps.coverage.outputs.exit_code }}"

          if [ "$TEST_EXIT_CODE" != "0" ]; then
            cat > badges/coverage.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "failed",
            "color": "red"
          }
          EOF
            exit 0
          fi

          RAW_COVERAGE=$(grep -oP 'statement-rate="\K[0-9.]+' target/scala-*/scoverage-report/scoverage.xml | head -1)

          if [ -z "$RAW_COVERAGE" ]; then
            PERCENT="unknown"
            COLOR="red"
          else
            PERCENT=$(awk "BEGIN {
              if ($RAW_COVERAGE <= 1) {
                printf \"%.0f\", $RAW_COVERAGE * 100
              } else {
                printf \"%.0f\", $RAW_COVERAGE
              }
            }")

            if [ "$PERCENT" -eq 100 ]; then
              COLOR="brightgreen"
            else
              COLOR="yellow"
            fi
          fi

          cat > badges/coverage.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${PERCENT}%",
            "color": "${COLOR}"
          }
          EOF

      - name: Upload coverage report for SonarQube
        uses: actions/upload-artifact@v4
        with:
          name: scoverage-report
          path: target/scala-*/scoverage-report/scoverage.xml
          if-no-files-found: error

      - name: Upload coverage badge data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: badges/coverage.json

  sonarqube:
    needs: test-and-coverage
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: [self-hosted, homelab-sonar]

    outputs:
      sonar_exit_code: ${{ steps.sonar.outputs.exit_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: scoverage-report
          path: target/scoverage-import

      - name: Start SonarQube container
        run: |
          docker rm -f sonarqube-ci || true

          docker volume create sonarqube_ci_data
          docker volume create sonarqube_ci_extensions
          docker volume create sonarqube_ci_logs

          docker run -d \
            --name sonarqube-ci \
            -p 9000:9000 \
            -v sonarqube_ci_data:/opt/sonarqube/data \
            -v sonarqube_ci_extensions:/opt/sonarqube/extensions \
            -v sonarqube_ci_logs:/opt/sonarqube/logs \
            --ulimit nofile=131072:131072 \
            --ulimit nproc=8192:8192 \
            sonarqube:community

      - name: Wait for SonarQube
        run: |
          echo "Waiting for SonarQube..."
          for i in {1..150}; do
            STATUS=$(curl -s http://localhost:9000/api/system/status | grep -oP '"status":"\K[^"]+' || true)
            echo "Status: ${STATUS:-not ready}"

            if [ "$STATUS" = "UP" ]; then
              exit 0
            fi

            sleep 5
          done

          echo "SonarQube did not become ready in time."
          docker logs sonarqube-ci
          exit 1

      - name: Initialize SonarQube admin password if needed
        run: |
          set -e

          echo "Checking SonarQube admin authentication..."

          DEFAULT_HTTP_CODE=$(curl -s -o /tmp/default-auth-response.txt -w "%{http_code}" \
            -u admin:admin \
            "http://localhost:9000/api/users/search?login=admin")

          CUSTOM_HTTP_CODE=$(curl -s -o /tmp/custom-auth-response.txt -w "%{http_code}" \
            -u "admin:${{ secrets.SONAR_ADMIN_PASSWORD }}" \
            "http://localhost:9000/api/users/search?login=admin")

          echo "Default admin HTTP code: $DEFAULT_HTTP_CODE"
          echo "Custom admin HTTP code: $CUSTOM_HTTP_CODE"

          if [ "$CUSTOM_HTTP_CODE" = "200" ]; then
            echo "Custom admin password already works."
            exit 0
          fi

          if [ "$DEFAULT_HTTP_CODE" = "200" ]; then
            echo "Changing default admin password..."

            CHANGE_HTTP_CODE=$(curl -s -o /tmp/change-password-response.txt -w "%{http_code}" \
              -u admin:admin \
              -X POST "http://localhost:9000/api/users/change_password" \
              --data-urlencode "login=admin" \
              --data-urlencode "previousPassword=admin" \
              --data-urlencode "password=${{ secrets.SONAR_ADMIN_PASSWORD }}")

            echo "Password change HTTP code: $CHANGE_HTTP_CODE"
            cat /tmp/change-password-response.txt || true

            CUSTOM_HTTP_CODE_AFTER=$(curl -s -o /tmp/custom-auth-after-response.txt -w "%{http_code}" \
              -u "admin:${{ secrets.SONAR_ADMIN_PASSWORD }}" \
              "http://localhost:9000/api/users/search?login=admin")

            echo "Custom admin HTTP code after change: $CUSTOM_HTTP_CODE_AFTER"

            if [ "$CUSTOM_HTTP_CODE_AFTER" != "200" ]; then
              echo "Custom admin password still does not work after password change."
              exit 1
            fi

            echo "Custom admin password works now."
            exit 0
          fi

          echo "Neither admin/admin nor SONAR_ADMIN_PASSWORD works."
          echo "Your persistent SonarQube volume probably contains a different admin password."
          exit 1

      - name: Create SonarQube analysis token
        id: sonar-token
        run: |
          set -e

          TOKEN_NAME="github-actions-cubatro-${GITHUB_RUN_ID}"

          RESPONSE=$(curl -s -u "admin:${{ secrets.SONAR_ADMIN_PASSWORD }}" \
            -X POST "http://localhost:9000/api/user_tokens/generate" \
            --data-urlencode "name=$TOKEN_NAME")

          TOKEN=$(echo "$RESPONSE" | grep -oP '"token":"\K[^"]+')

          if [ -z "$TOKEN" ]; then
            echo "Could not create SonarQube token."
            echo "$RESPONSE"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "token_name=$TOKEN_NAME" >> "$GITHUB_OUTPUT"

      - name: Run SonarQube analysis
        id: sonar
        continue-on-error: true
        run: |
          set +e

          docker run --rm \
            --network host \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey=cubatro \
            -Dsonar.projectName=cubatro \
            -Dsonar.sources=src/main/scala \
            -Dsonar.tests=src/test/scala \
            -Dsonar.scala.coverage.reportPaths=target/scoverage-import/scoverage.xml \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token="${{ steps.sonar-token.outputs.token }}" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Create SonarQube quality gate badge data
        run: |
          mkdir -p badges

          SONAR_EXIT_CODE="${{ steps.sonar.outputs.exit_code }}"

          if [ "$SONAR_EXIT_CODE" != "0" ]; then
            cat > badges/sonar-quality-gate.json <<EOF
          {
            "schemaVersion": 1,
            "label": "quality gate",
            "message": "failed",
            "color": "red"
          }
          EOF
            exit 0
          fi

          STATUS=$(curl -s -u "admin:${{ secrets.SONAR_ADMIN_PASSWORD }}" \
            "http://localhost:9000/api/qualitygates/project_status?projectKey=cubatro" \
            | grep -oP '"status":"\K[^"]+')

          if [ "$STATUS" = "OK" ]; then
            MESSAGE="passed"
            COLOR="brightgreen"
          elif [ "$STATUS" = "WARN" ]; then
            MESSAGE="warning"
            COLOR="yellow"
          elif [ "$STATUS" = "ERROR" ]; then
            MESSAGE="failed"
            COLOR="red"
          else
            MESSAGE="unknown"
            COLOR="lightgrey"
          fi

          cat > badges/sonar-quality-gate.json <<EOF
          {
            "schemaVersion": 1,
            "label": "quality gate",
            "message": "${MESSAGE}",
            "color": "${COLOR}"
          }
          EOF

      - name: Revoke temporary SonarQube analysis token
        if: always() && steps.sonar-token.outputs.token_name != ''
        run: |
          curl -s -u "admin:${{ secrets.SONAR_ADMIN_PASSWORD }}" \
            -X POST "http://localhost:9000/api/user_tokens/revoke" \
            --data-urlencode "name=${{ steps.sonar-token.outputs.token_name }}" \
            || true

      - name: Upload SonarQube badge data
        uses: actions/upload-artifact@v4
        with:
          name: sonar-badge
          path: badges/sonar-quality-gate.json

      - name: Stop SonarQube container
        if: always()
        run: |
          docker rm -f sonarqube-ci || true

  commit-badges:
    needs:
      - test-and-coverage
      - sonarqube

    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: badges

      - name: Download SonarQube badge
        uses: actions/download-artifact@v4
        with:
          name: sonar-badge
          path: badges

      - name: Commit badge data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update coverage and SonarQube badges
          file_pattern: badges/*.json

  final-status:
    needs:
      - test-and-coverage
      - sonarqube
      - commit-badges

    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Fail workflow if tests failed
        if: needs.test-and-coverage.outputs.test_exit_code != '0'
        run: exit 1

      - name: Fail workflow if SonarQube failed
        if: github.event_name == 'push' && needs.sonarqube.outputs.sonar_exit_code != '0'
        run: exit 1
